<h2 mat-dialog-title>Reverse Payment</h2>
<mat-dialog-content [formGroup]="form">
  <p>You are about to reverse payment for <strong>{{ data.customerName }}</strong>.</p>
  <p>Please provide the reason for reversing this payment:</p>

  <mat-form-field appearance="outline" style="width:100%">
    <mat-label>Reason for Reversal</mat-label>
    <textarea matInput formControlName="reason" placeholder="e.g., Duplicate payment, incorrect amount, etc." rows="4"></textarea>
    <mat-error *ngIf="form.get('reason')?.hasError('required')">Reason is required</mat-error>
    <mat-error *ngIf="form.get('reason')?.hasError('minlength')">Reason must be at least 5 characters</mat-error>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()" [disabled]="isSubmitting">Cancel</button>
  <button mat-flat-button color="warn" (click)="submit()" [disabled]="form.invalid || isSubmitting">
    <mat-spinner diameter="20" *ngIf="isSubmitting" style="display:inline-block; margin-right:8px;"></mat-spinner>
    {{ isSubmitting ? 'Reversing...' : 'Reverse Payment' }}
  </button>
</mat-dialog-actions>
