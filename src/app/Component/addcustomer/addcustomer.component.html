<form [formGroup]="customerform" (ngSubmit)="Savecustomer()" class="responsive-form">
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ title }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <!-- Country & State Row -->
      <mat-form-field appearance="outline">
        <mat-label>Country</mat-label>
        <mat-select formControlName="countryCode" (selectionChange)="onCountryChange($event.value)">
          <mat-option *ngFor="let country of countryList" [value]="country.countryCode">{{ country.countryName }}</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>State</mat-label>
        <mat-select formControlName="stateCode">
          <mat-option *ngFor="let state of stateList" [value]="state.stateCode">{{ state.stateName }}</mat-option>
        </mat-select>
      </mat-form-field>

      <!-- Name -->
      <mat-form-field appearance="outline" fxFlex="100">
        <mat-label>Name</mat-label>
        <input matInput formControlName="name" />
      </mat-form-field>

      <!-- Company & Toggle Button -->
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:stretch">
        <mat-form-field appearance="outline" style="flex:1;min-width:150px">
          <mat-label>Company</mat-label>
          <input matInput formControlName="customer_company" />
        </mat-form-field>
        <button mat-stroked-button type="button" color="primary" (click)="showOptional = !showOptional" style="flex-shrink:0;white-space:nowrap">
          {{ showOptional ? '−' : '+' }} Optional
        </button>
      </div>

      <!-- Optional Fields -->
      <ng-container *ngIf="showOptional">
        <mat-form-field appearance="outline" fxFlex="100">
          <mat-label>GSTIN/UIN/Aadhar Number/Mobile Number</mat-label>
          <input matInput formControlName="gst_number" />
        </mat-form-field>

        <mat-form-field appearance="outline" fxFlex="100">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" />
        </mat-form-field>

        <mat-form-field appearance="outline" fxFlex="100">
          <mat-label>Phone</mat-label>
          <input matInput formControlName="phone" />
        </mat-form-field>
      </ng-container>

      <!-- Mobile No & Alternate Mobile -->
      <mat-form-field appearance="outline">
        <mat-label>Mobile No</mat-label>
        <input matInput formControlName="mobileNo" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Alternate Mobile</mat-label>
        <input matInput formControlName="alternateMobile" />
      </mat-form-field>

      <!-- Active Checkbox -->
      <div style="padding:8px 0">
        <mat-checkbox formControlName="isActive">Is Active</mat-checkbox>
      </div>

      <!-- Address Full Width -->
      <mat-form-field appearance="outline" fxFlex="100">
        <mat-label>Address</mat-label>
        <textarea matInput formControlName="addressDetails" rows="4"></textarea>
      </mat-form-field>
    </mat-card-content>

    <mat-card-actions class="action-buttons">
      <button type="submit" mat-raised-button color="primary" [disabled]="customerform.invalid">Save</button>
      <a routerLink="/customer" mat-raised-button color="accent">Cancel</a>
    </mat-card-actions>
  </mat-card>
</form>
