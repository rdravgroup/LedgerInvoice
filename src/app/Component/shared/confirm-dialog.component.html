<h2 mat-dialog-title>{{ title }}</h2>
<mat-dialog-content>
  <p>{{ message }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">{{ cancelText }}</button>
  <button mat-flat-button color="warn" (click)="confirm()">{{ confirmText }}</button>
</mat-dialog-actions>
