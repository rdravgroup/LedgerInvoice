<div class="page-header">
  <h2>Company Declarations</h2>
  <div class="actions">
    <button mat-flat-button color="primary" (click)="openCreate()" *ngIf="isAdmin || isSuperAdmin">Create Declaration</button>
  </div>
</div>

<div class="filter-row" *ngIf="isSuperAdmin">
  <mat-form-field appearance="outline">
    <mat-label>Company</mat-label>
    <mat-select [(value)]="selectedCompanyId" (selectionChange)="onCompanyChange()">
      <mat-option *ngFor="let c of companies" [value]="c.companyId">{{ c.name }} ({{ c.companyId }})</mat-option>
    </mat-select>
  </mat-form-field>
</div>

<div class="table-container">
  <table mat-table [dataSource]="datasource" class="mat-elevation-z8">

    <ng-container matColumnDef="recId">
      <th mat-header-cell *matHeaderCellDef>Id</th>
      <td mat-cell *matCellDef="let e">{{ e.recId || e.RecId || e.Rec_Id }}</td>
    </ng-container>

    <ng-container matColumnDef="declaration">
      <th mat-header-cell *matHeaderCellDef>Declaration</th>
      <td mat-cell *matCellDef="let e">{{ e.declaration || e.Declaration }}</td>
    </ng-container>

    <ng-container matColumnDef="active">
      <th mat-header-cell *matHeaderCellDef>Active</th>
      <td mat-cell *matCellDef="let e">{{ e.active || e.Active }}</td>
    </ng-container>

    <ng-container matColumnDef="createdDate">
      <th mat-header-cell *matHeaderCellDef>Created</th>
      <td mat-cell *matCellDef="let e">{{ e.createdDate | date:'short' }}</td>
    </ng-container>

    <ng-container matColumnDef="action">
      <th mat-header-cell *matHeaderCellDef>Action</th>
      <td mat-cell *matCellDef="let e">
        <button mat-icon-button color="primary" (click)="openEdit(e)" *ngIf="isAdmin || isSuperAdmin"><mat-icon>edit</mat-icon></button>
        <button mat-icon-button color="warn" (click)="deleteItem(e.recId || e.RecId || e.Rec_Id)" *ngIf="isAdmin || isSuperAdmin"><mat-icon>delete</mat-icon></button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <mat-paginator [pageSizeOptions]="[10,25,50]" showFirstLastButtons></mat-paginator>
</div>
